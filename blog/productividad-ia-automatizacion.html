<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0f; --accent: #7c6fff; --text: #e8e8f0; }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'DM Sans', sans-serif; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      text-align: center;
    }
    .container { padding: 20px; }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(5rem, 15vw, 10rem); margin: 0; color: var(--accent); opacity: 0.5; }
    h2 { font-family: 'Syne', sans-serif; font-size: 2rem; margin-top: -20px; }
    p { color: #7a7a9a; margin-bottom: 30px; font-size: 1.2rem; }
    .btn {
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 100px;
      font-weight: bold;
      transition: transform 0.3s ease;
      display: inline-block;
    }
    .btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
